<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RFR Team Shirt | Reed Family Racing</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<main>
  <section class="content-section product-page">

    <a href="merch.html" class="history-btn gallery-back-btn">
      ← Back to Merch
    </a>

    <div class="product-layout">

      <!-- LEFT SIDE: PRODUCT IMAGES -->
      <div class="product-gallery">

        <div class="main-product-image">
          <img id="mainShirtImage"
               src="assets/merch/rfr-team-shirt-front.png"
               alt="RFR Team Shirt">
        </div>

        <div class="product-thumbnails">
          <img src="assets/merch/rfr-team-shirt-front.png"
               alt="Front View"
               onclick="changeShirtImage(this.src)">

          <img src="assets/merch/rfr-team-shirt-back.png"
               alt="Back View"
               onclick="changeShirtImage(this.src)">
        </div>

      </div>

      <!-- RIGHT SIDE: PRODUCT INFO -->
      <div class="product-info">

        <h1>RFR Team Shirt</h1>

        <p class="product-price">$25.00</p>

        <p class="product-description">
          Official Reed Family Racing team shirt featuring the RFR logo across the chest.
          This is the same clean look worn by the team at the track.
        </p>

        <label for="shirt-size">Size</label>
        <select id="shirt-size" class="shirt-size-select">
          <option>Select Size</option>
          <option>Small</option>
          <option>Medium</option>
          <option>Large</option>
          <option>XL</option>
          <option>2XL</option>
          <option>3XL</option>
          <option>4XL</option>
        </select>

        <label for="shirt-quantity">Quantity</label>
        <input type="number" id="shirt-quantity" class="shirt-quantity" value="1" min="1">

        <button class="history-btn product-cart-btn">
          Add to Cart
        </button>

      </div>

    </div>

  </section>
</main>

  <script src="js/site.js"></script>
</body>
</html>
