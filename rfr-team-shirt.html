<main>
  <section class="content-section product-page">

    <a href="merch.html" class="history-btn gallery-back-btn">
      ← Back to Merch
    </a>

    <div class="product-layout">

      <!-- LEFT SIDE: PRODUCT IMAGES -->
      <div class="product-gallery">

        <div class="main-product-image">
          <img id="mainShirtImage"
               src="assets/merch/team/rfr-team-shirt-front.png"
               alt="RFR Team Shirt">
        </div>

        <div class="product-thumbnails">
          <img src="assets/merch/team/rfr-team-shirt-front.png"
               alt="Front View"
               onclick="changeShirtImage(this.src)">

          <img src="assets/merch/team/rfr-team-shirt-back.png"
               alt="Back View"
               onclick="changeShirtImage(this.src)">
        </div>

      </div>

      <!-- RIGHT SIDE: PRODUCT INFO -->
      <div class="product-info">

        <h1>RFR Team Shirt</h1>

        <p class="product-price">$25.00</p>

        <p class="product-description">
          Official Reed Family Racing team shirt featuring the RFR logo across the chest.
          This is the same clean look worn by the team at the track.
        </p>

        <label for="shirt-size">Size</label>
        <select id="shirt-size" class="shirt-size-select">
          <option>Select Size</option>
          <option>Small</option>
          <option>Medium</option>
          <option>Large</option>
          <option>XL</option>
          <option>2XL</option>
          <option>3XL</option>
          <option>4XL</option>
        </select>

        <label for="shirt-quantity">Quantity</label>
        <select id="shirt-size" class="shirt-size-select">
          <option>Quantity</option>
          <option>1</option>
          <option>2</option>
          <option>3</option>
          <option>4</option>
          <option>5</option>
          <option>6</option>
          <option>7</option>
          <option>8</option>
          <option>9</option>
          <option>10</option>
        </select>

        <button class="history-btn product-cart-btn">
          Add to Cart
        </button>

      </div>

    </div>

  </section>
</main>
<footer class="site-footer">
  <p>© <span id="year"></span> Reed Family Racing</p>
</footer>

    <img src="assets/sponsors/underdog-mechanical.png" class="ticker-logo ticker-underdog-mechanical" alt="Underdog Mechanical">
    <img src="assets/sponsors/james-wilson-company.png" class="ticker-logo ticker-james-wilson-company" alt="James Wilson Company">

    <img src="assets/sponsors/precision-coating.png" class="ticker-logo ticker-precision-coating" alt="Precision Coating">
